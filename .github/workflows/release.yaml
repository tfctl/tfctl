name: Release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    name: Build and release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clean dist folder
        run: |
          rm -rf dist

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --import --batch --yes
          gpg --list-secret-keys

      - name: Generate release notes
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          if [[ -z "${tag}" ]]; then
            echo "ERROR: GITHUB_REF_NAME is empty" >&2
            exit 1
          fi

          awk -v tag="${tag}" '
            BEGIN { in_section=0; found=0; n=0 }
            { sub(/\r$/, "") }
            $0 ~ ("^## " tag "([[:space:]]+-[[:space:]].*)?$") {
              in_section=1
              found=1
              print
              next
            }
            in_section && $0 ~ "^## v[0-9]+\.[0-9]+\.[0-9]+([-.].*)?([[:space:]]+-[[:space:]].*)?$" { exit }
            in_section { print; n++ }
            END {
              if (!found) { print "ERROR: release heading not found for " tag > "/dev/stderr"; exit 1 }
              if (n == 0) { print "ERROR: release notes section empty for " tag > "/dev/stderr"; exit 1 }
            }
          ' CHANGELOG.md > /tmp/release-notes.md

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v2
        with:
          args: release --release-notes=/tmp/release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GH_GORELEASER_PAT }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Upload dist folder as artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-outputs
          path: dist/
          retention-days: 5

      - name: Ensure tap release exists
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ github.ref_name }}"

          if gh release view "$tag" --repo tfctl/homebrew-tfctl >/dev/null 2>&1; then
            gh release edit "$tag" \
              --repo tfctl/homebrew-tfctl \
              --title "$tag" \
              --notes "Release $tag for Homebrew tap." \
              --prerelease
          else
            gh release create "$tag" \
              --repo tfctl/homebrew-tfctl \
              --title "$tag" \
              --notes "Release $tag for Homebrew tap." \
              --prerelease \
              --latest
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_GORELEASER_PAT }}

      - name: Copy Brew artifacts to tap
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          # Upload archives
          gh release upload "${{ github.ref_name }}" \
            dist/*.{tar.gz,zip,tar.xz,tgz} \
            --repo tfctl/homebrew-tfctl --clobber || true

          # Upload detached signatures
          gh release upload "${{ github.ref_name }}" \
            dist/*.{tar.gz.sig,zip.sig,tar.xz.sig,tgz.sig} \
            --repo tfctl/homebrew-tfctl --clobber || true

          # Upload docs
          gh release upload "${{ github.ref_name }}" \
            README.md LICENSE \
            --repo tfctl/homebrew-tfctl --clobber
        env:
          GH_TOKEN: ${{ secrets.GH_GORELEASER_PAT }}
