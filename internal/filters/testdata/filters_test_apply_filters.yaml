# no-cloc
- name: no_filters
  filters: []
  want: true

- name: single_filter_match
  filters:
    - key: "name"
      operand: "="
      value: "my-resource"
      negate: false
  want: true

- name: single_filter_no_match
  filters:
    - key: "name"
      operand: "="
      value: "other"
      negate: false
  want: false

- name: multiple_filters_all_match
  filters:
    - key: "name"
      operand: "="
      value: "my-resource"
      negate: false
    - key: "type"
      operand: "^"
      value: "aws_"
      negate: false
  want: true

- name: multiple_filters_one_fails
  filters:
    - key: "name"
      operand: "="
      value: "my-resource"
      negate: false
    - key: "type"
      operand: "^"
      value: "gcp_"
      negate: false
  want: false

- name: server-side_filter_ignored
  filters:
    - key: "_serverside_filter"
      operand: "="
      value: "value"
      negate: false
  want: true

- name: missing_attribute_key_continues
  filters:
    - key: "nonexistent"
      operand: "="
      value: "value"
      negate: false
  want: true

- name: numeric_comparison
  filters:
    - key: "count"
      operand: ">"
      value: "3"
      negate: false
  want: true

- name: missing_key_returns_nil
  filters:
    - key: "nonexistent_key"
      operand: "="
      value: "value"
      negate: false
  want: true

- name: null_value_filter_fails
  filters:
    - key: "description"
      operand: "="
      value: "value"
      negate: false
  want: false

- name: unsupported_type_with_equals_operator_passes
  filters:
    - key: "nested"
      operand: "="
      value: "value"
      negate: false
  want: true

- name: unsupported_type_with_contains_operator_uses_checkContainsOperand
  filters:
    - key: "nested"
      operand: "@"
      value: "inner"
      negate: false
  want: true

- name: array_type_with_equals_operator_passes
  filters:
    - key: "tags"
      operand: "="
      value: "prod"
      negate: false
  want: true

  # Pass when value exists.
- name: exists_operator_true
  filters:
    - key: "name"
      negate: false
      operand: "?"
      value: ""
  want: true

  # Pass when value does not exist.
- name: exists_operator_false_for_null
  filters:
    - key: "description"
      negate: false
      operand: "?"
      value: ""
  want: false

  # Pass when value does not exist (NEGATED).
- name: missing_operator_true_for_null
  filters:
    - key: "description"
      negate: true
      operand: "?"
      value: ""
  want: true

  # Pass when value does not exist (NEGATED).
- name: missing_operator_false_for_present
  filters:
    - key: "name"
      negate: true
      operand: "?"
      value: ""
  want: false

  # Pass when value does not exist (empty string).
- name: exists_operator_false_for_empty_string
  filters:
    - key: "region"
      negate: false
      operand: "?"
      value: ""
  want: false

  # Pass when value does not exist (empty string, NEGATED).
- name: missing_operator_true_for_empty_string
  filters:
    - key: "region"
      negate: true
      operand: "?"
      value: ""
  want: true

  # Pass when key doesn't exist in attrs.
- name: missing_operator_true_for_missing_attr
  filters:
    - key: "id"
      negate: true
      operand: "?"
      value: ""
  want: true

  # Pass when nested child exists.
- name: exists_operator_true_for_nested_child
  filters:
    - key: "nested.inner"
      negate: false
      operand: "?"
      value: ""
  want: true

  # Pass when nested child does not exist.
- name: exists_operator_false_for_nested_missing
  filters:
    - key: "nested.does_not_exist"
      negate: false
      operand: "?"
      value: ""
  want: false
