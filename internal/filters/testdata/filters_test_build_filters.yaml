# no-cloc
- name: empty_spec
  spec: ""
  delimiter: ""
  want: null
  wantCount: 0

- name: single_exact_match_filter
  spec: "name=my-resource"
  delimiter: ""
  want:
    - key: "name"
      operator: "="
      value: "my-resource"
      negate: false
  wantCount: 1

- name: prefix_match_filter
  spec: "type^aws_"
  delimiter: ""
  want:
    - key: "type"
      operator: "^"
      value: "aws_"
      negate: false
  wantCount: 1

- name: regex_match_filter
  spec: "tags~^env-"
  delimiter: ""
  want:
    - key: "tags"
      operator: "~"
      value: "^env-"
      negate: false
  wantCount: 1

- name: negated_exact_match
  spec: "name!=test"
  delimiter: ""
  want:
    - key: "name"
      operator: "="
      value: "test"
      negate: true
  wantCount: 1

- name: negated_prefix_match
  spec: "type!^aws_"
  delimiter: ""
  want:
    - key: "type"
      operator: "^"
      value: "aws_"
      negate: true
  wantCount: 1

- name: multiple_filters
  spec: "name=test,type^aws_"
  delimiter: ""
  want:
    - key: "name"
      operator: "="
      value: "test"
      negate: false
    - key: "type"
      operator: "^"
      value: "aws_"
      negate: false
  wantCount: 2

- name: greater_than_numeric
  spec: "count>5"
  delimiter: ""
  want:
    - key: "count"
      operator: ">"
      value: "5"
      negate: false
  wantCount: 1

- name: less_than_numeric
  spec: "count<10"
  delimiter: ""
  want:
    - key: "count"
      operator: "<"
      value: "10"
      negate: false
  wantCount: 1

- name: contains_operator
  spec: "name@test"
  delimiter: ""
  want:
    - key: "name"
      operator: "@"
      value: "test"
      negate: false
  wantCount: 1

- name: regex_operator
  spec: "name/^test.*"
  delimiter: ""
  want:
    - key: "name"
      operator: "/"
      value: "^test.*"
      negate: false
  wantCount: 1

- name: key_without_operator_or_target
  spec: "name=test,status,type^aws_"
  delimiter: ""
  want:
    - key: "name"
      operator: "="
      value: "test"
      negate: false
    - key: "status"
      operator: ""
      value: ""
      negate: false
    - key: "type"
      operator: "^"
      value: "aws_"
      negate: false
  wantCount: 3

- name: custom_delimiter
  spec: "name=test|type^aws_"
  delimiter: "|"
  want:
    - key: "name"
      operator: "="
      value: "test"
      negate: false
    - key: "type"
      operator: "^"
      value: "aws_"
      negate: false
  wantCount: 2

- name: key_with_dots
  spec: "backend.s3.region=us-west-2"
  delimiter: ""
  want:
    - key: "backend.s3.region"
      operator: "="
      value: "us-west-2"
      negate: false
  wantCount: 1

- name: empty_target
  spec: "name="
  delimiter: ""
  want:
    - key: "name"
      operator: "="
      value: ""
      negate: false
  wantCount: 1

- name: exists_unary_operator
  spec: "name?"
  delimiter: ""
  want:
    - key: "name"
      operator: "?"
      value: ""
      negate: false
  wantCount: 1

- name: missing_unary_operator
  spec: "description!?"
  delimiter: ""
  want:
    - key: "description"
      operator: "?"
      value: ""
      negate: true
  wantCount: 1
